<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くずし字クイズ②</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    background: #fdf6e3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    border: 2px solid #8b6c42;
    border-radius: 8px;
    padding: 32px 28px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  h1 { font-size: 1.4rem; color: #4a3520; margin-bottom: 6px; letter-spacing: 0.15em; }
  .score-bar { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
  .progress { font-size: 0.9rem; color: #7a5c30; margin-bottom: 16px; }
  .image-wrap {
    background: #f5efe0;
    border: 1px solid #d4b896;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 20px;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }
  .image-wrap img { max-width: 100%; max-height: 200px; object-fit: contain; }
  .img-error { color: #8b6c42; font-size: 0.85rem; display: none; }
  .question-text { font-size: 1rem; color: #4a3520; margin-bottom: 20px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  input[type="text"] {
    flex: 1; padding: 10px 14px; font-size: 1.2rem; font-family: inherit;
    border: 2px solid #c8a87a; border-radius: 6px; outline: none;
    text-align: center; background: #fdfaf4; color: #4a3520;
  }
  input[type="text"]:focus { border-color: #8b6c42; }
  button {
    padding: 10px 20px; font-size: 1rem; font-family: inherit;
    border: none; border-radius: 6px; cursor: pointer; transition: background 0.2s;
  }
  .btn-answer { background: #8b6c42; color: #fff; min-width: 80px; }
  .btn-answer:hover { background: #6b4e2a; }
  .btn-next { background: #5a8a5a; color: #fff; width: 100%; margin-top: 8px; padding: 12px; }
  .btn-next:hover { background: #3e6e3e; }
  .btn-start { background: #8b6c42; color: #fff; width: 100%; padding: 14px; font-size: 1.1rem; margin-top: 8px; }
  .btn-start:hover { background: #6b4e2a; }
  .btn-outline {
    background: #fff; color: #8b6c42; border: 2px solid #8b6c42;
    width: 100%; padding: 10px; font-size: 0.95rem; margin-top: 8px;
  }
  .btn-outline:hover { background: #fdf0e0; }
  .feedback { font-size: 1.1rem; font-weight: bold; padding: 12px; border-radius: 6px; margin-bottom: 12px; }
  .correct { background: #e8f5e9; color: #2e7d32; }
  .wrong   { background: #fdecea; color: #c62828; }
  .answer-reveal { font-size: 0.95rem; color: #4a3520; margin-bottom: 12px; }
  .answer-reveal span { font-size: 1.4rem; font-weight: bold; }
  .result .big { font-size: 2rem; font-weight: bold; color: #8b6c42; }
  .hidden { display: none; }
  .title-big { font-size: 1.8rem; color: #4a3520; letter-spacing: 0.2em; margin-bottom: 12px; }
  #screen-start p { color: #7a5c30; font-size: 0.95rem; margin-bottom: 8px; line-height: 1.7; }
  .count-select { margin: 16px 0; }
  .count-select label { font-size: 0.9rem; color: #7a5c30; display: block; margin-bottom: 6px; }
  .count-select select {
    padding: 6px 12px; font-size: 1rem; font-family: inherit;
    border: 2px solid #c8a87a; border-radius: 6px; background: #fdfaf4; color: #4a3520;
  }
</style>
</head>
<body>
<div class="container">

  <div id="screen-start">
    <div class="title-big">くずし字クイズ②</div>
    <p>ひらがなの字母になった<br>くずし字を読む練習をしましょう。</p>
    <div class="count-select">
      <label>出題数を選んでください</label>
      <select id="q-count">
        <option value="5">5問</option>
        <option value="10" selected>10問</option>
        <option value="20">20問</option>
        <option value="all">全問（63問）</option>
      </select>
    </div>
    <button class="btn-start" onclick="startQuiz()">はじめる</button>
  </div>

  <div id="screen-quiz" class="hidden">
    <h1>くずし字クイズ②</h1>
    <div class="score-bar">正解数: <span id="score">0</span> / <span id="total-done">0</span></div>
    <div class="progress" id="progress"></div>
    <div class="image-wrap">
      <img id="quiz-img" src="" alt="くずし字画像" onerror="showImgError()">
      <div class="img-error" id="img-error">画像を読み込めませんでした</div>
    </div>
    <div class="question-text">この字母は何という漢字でしょう？</div>
    <div class="input-row">
      <input type="text" id="answer-input" maxlength="3" placeholder="漢字1文字">
      <button class="btn-answer" id="btn-answer">答える</button>
    </div>
    <div id="feedback" class="hidden"></div>
    <div id="answer-reveal" class="answer-reveal hidden"></div>
    <button id="btn-next" class="btn-next hidden">次の問題へ →</button>
  </div>

  <div id="screen-result" class="hidden">
    <h1>結果発表</h1>
    <div style="margin: 24px 0;">
      <div class="result">
        <div class="big" id="result-score"></div>
        <div style="margin-top:8px;" id="result-comment"></div>
      </div>
    </div>
    <button class="btn-start" onclick="startQuiz()">もう一度挑戦</button>
    <button id="btn-review" class="btn-next" style="width:100%;margin-top:8px;" onclick="startReview()">間違えた問題を復習する</button>
    <button class="btn-outline" onclick="showScreen('screen-start')">出題数を変える</button>
  </div>

</div>
<script>
const BASE_URL = "https://raw.githubusercontent.com/nmttos/-/main/%E3%81%B2%E3%82%89%E3%81%8C%E3%81%AA%E5%AD%97%E6%AF%8D%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB/";

const FILES = [
  "事.png","事②.png","伝.png","南.png","名.png","喜.png","声①.png","声②.png",
  "夜.png","奉.png","女.png","宝.png","家.png","寿.png","帝.png","年①.png",
  "年②.png","得.png","悪.png","意.png","意②.png","愛.png","愛②.png","憂.png",
  "我.png","所.png","故.png","散.png","数①.png","数②.png","新.png","於.png",
  "春①.png","春②.png","有①.png","有②.png","本.png","東.png","歟.png","求.png",
  "流.png","瀬.png","為.png","異.png","真.png","緒.png","縁.png","落.png",
  "葉.png","衛①.png","衛②.png","賀.png","越.png","遊.png","遠.png","都.png",
  "間.png","難①.png","難②.png","雲.png","露.png","馬.png","馬②.png"
];

function getAnswer(f) {
  return f.replace(".png","").replace(/[①②③④⑤]/,"");
}

const ALL_QUESTIONS = FILES.map(f => ({
  img: BASE_URL + encodeURIComponent(f),
  answer: getAnswer(f)
}));

let questions=[], current=0, score=0, answered=false, mistakes=[];

const inputEl = document.getElementById('answer-input');
const btnAnswer = document.getElementById('btn-answer');
const btnNext = document.getElementById('btn-next');

btnAnswer.addEventListener('click', checkAnswer);
btnNext.addEventListener('click', nextQuestion);
inputEl.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (!answered) checkAnswer();
  else nextQuestion();
});

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function showScreen(id) {
  ['screen-start','screen-quiz','screen-result'].forEach(s=>
    document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function startQuiz() {
  const sel=document.getElementById('q-count').value;
  const shuffled=shuffle(ALL_QUESTIONS);
  questions=sel==='all'?shuffled:shuffled.slice(0,parseInt(sel));
  current=0; score=0; mistakes=[];
  showScreen('screen-quiz');
  loadQuestion();
}

function loadQuestion() {
  answered=false;
  const q=questions[current];
  document.getElementById('progress').textContent=`第${current+1}問 / 全${questions.length}問`;
  document.getElementById('score').textContent=score;
  document.getElementById('total-done').textContent=current;
  const img=document.getElementById('quiz-img');
  img.style.display='block';
  document.getElementById('img-error').style.display='none';
  img.src=q.img;
  inputEl.value='';
  inputEl.readOnly=false;
  inputEl.focus();
  document.getElementById('feedback').classList.add('hidden');
  document.getElementById('answer-reveal').classList.add('hidden');
  btnNext.classList.add('hidden');
}

function showImgError() {
  document.getElementById('quiz-img').style.display='none';
  document.getElementById('img-error').style.display='block';
}

function checkAnswer() {
  const input=inputEl.value.trim();
  if(!input)return;
  answered=true;
  inputEl.readOnly=true;
  const q=questions[current];
  const correct=input===q.answer;
  if(correct) score++;
  else if(!mistakes.some(m=>m.img===q.img)) mistakes.push(q);
  const fb=document.getElementById('feedback');
  fb.textContent=correct?'⭕ 正解！':'❌ 不正解';
  fb.className='feedback '+(correct?'correct':'wrong');
  fb.classList.remove('hidden');
  const reveal=document.getElementById('answer-reveal');
  reveal.innerHTML=correct?'よくできました！':`正解は <span>${q.answer}</span> でした`;
  reveal.classList.remove('hidden');
  document.getElementById('score').textContent=score;
  document.getElementById('total-done').textContent=current+1;
  btnNext.textContent=current+1>=questions.length?'結果を見る':'次の問題へ →';
  btnNext.classList.remove('hidden');
}

function nextQuestion() {
  current++;
  if(current>=questions.length) showResult();
  else loadQuestion();
}

function showResult() {
  showScreen('screen-result');
  const pct=score/questions.length;
  document.getElementById('result-score').textContent=`${score} / ${questions.length}`;
  const c=['もう一度チャレンジしてみよう！','まずまずです。復習しましょう。','よくできました！','満点！素晴らしい！'];
  document.getElementById('result-comment').textContent=c[pct===1?3:pct>=0.75?2:pct>=0.5?1:0];
  const btnReview=document.getElementById('btn-review');
  if(mistakes.length>0){
    btnReview.textContent=`間違えた${mistakes.length}問を復習する`;
    btnReview.style.display='block';
  } else {
    btnReview.style.display='none';
  }
}

function startReview() {
  questions=shuffle(mistakes);
  current=0; score=0; mistakes=[];
  showScreen('screen-quiz');
  loadQuestion();
}
</script>
</body>
</html>
